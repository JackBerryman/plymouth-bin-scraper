name: Nightly bin data refresh (no WhatsApp)

on:
  # Runs every night at 02:15 UTC
  schedule:
    - cron: "15 2 * * *"
  # Handy for manual checks
  workflow_dispatch:

# Force GitHub JavaScript actions to run on Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Avoid clashing page deployments if two workflows overlap
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install "rich>=13.0.0"
          python -m playwright install --with-deps chromium

      - name: Run scraper (headless)
        env:
          HEADLESS: "true"
          DEBUG_PAUSE: "false"
          OUTPUT_DIR: public

          # Defaults for unattended runs
          POSTCODE_DEFAULT: "PL6 5HX"
          ADDRESS_HINT_DEFAULT: "72 Windermere"
        run: |
          export POSTCODE="$POSTCODE_DEFAULT"
          export ADDRESS_HINT="$ADDRESS_HINT_DEFAULT"
          python scraper.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: refresh
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
